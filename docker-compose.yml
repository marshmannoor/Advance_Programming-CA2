services:
  mysql:
    image: mysql:8.4
    container_name: northstar-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: northstar_tracker
      MYSQL_USER: northstar_user
      MYSQL_PASSWORD: northstar_password
    ports:
      - "3306:3306"
    volumes:
      - northstar_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  northstar_mysql_data:
